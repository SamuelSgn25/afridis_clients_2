<!DOCTYPE html>
<html>
<head>
    <title>Test CORS</title>
</head>
<body>
    <h1>Test CORS</h1>
    <button onclick="testCORS()">Tester CORS</button>
    <pre id="result"></pre>

    <script>
    async function testCORS() {
        const result = document.getElementById('result');
        result.textContent = 'Test en cours...';
        
        try {
            const response = await fetch('https://anyx-afridis.alwaysdata.net/api/auth/login', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({ test: 'data' }),
                credentials: 'include'
            });
            
            const data = await response.json();
            result.textContent = '✅ Succès !\n' + JSON.stringify(data, null, 2);
        } catch (error) {
            result.textContent = '❌ Erreur:\n' + error.message;
        }
    }
    </script>
</body>
</html>
